<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>☁️ CloudWeather</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── NAV ── */
    nav {
      width: 100%;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand { font-size: 1.5rem; font-weight: 700; color: #4a4a8a; letter-spacing: 1px; }
    .nav-links { display: flex; gap: 8px; }
    .nav-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
      background: rgba(255,255,255,0.5);
      color: #4a4a8a;
    }
    .nav-btn:hover, .nav-btn.active {
      background: #4a4a8a;
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74,74,138,0.3);
    }
    #nav-user-info { font-weight: 600; color: #4a4a8a; font-size: 0.9rem; }

    /* ── PAGES ── */
    .page { display: none; width: 100%; max-width: 680px; padding: 40px 20px; }
    .page.active { display: block; }

    /* ── CARD ── */
    .card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 8px 32px rgba(74,74,138,0.12);
      border: 1px solid rgba(255,255,255,0.7);
      margin-bottom: 20px;
    }
    .card h2 { font-size: 1.5rem; color: #4a4a8a; margin-bottom: 22px; text-align: center; }
    .card h3 { font-size: 1.1rem; color: #4a4a8a; margin-bottom: 14px; }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #6b6baa; margin-bottom: 6px; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid rgba(74,74,138,0.15);
      border-radius: 14px;
      font-size: 1rem;
      background: rgba(255,255,255,0.8);
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4a4a8a; }

    /* ── BUTTONS ── */
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
    }
    .btn-primary { background: linear-gradient(135deg, #4a4a8a, #7b7bc4); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(74,74,138,0.35); }
    .btn-danger { background: linear-gradient(135deg, #ff6b8a, #ff8fab); color: white; width: auto; padding: 7px 14px; font-size: 0.85rem; border-radius: 10px; margin-top: 0; }
    .btn-danger:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(255,107,138,0.35); }
    .btn-sm { background: linear-gradient(135deg, #4a4a8a, #7b7bc4); color: white; width: auto; padding: 9px 18px; font-size: 0.9rem; border-radius: 12px; margin-top: 0; }
    .btn-sm:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,74,138,0.3); }

    /* ── ALERT ── */
    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }
    .alert-error { background: rgba(255,107,138,0.15); color: #c0395a; border: 1px solid rgba(255,107,138,0.3); }
    .alert-success { background: rgba(72,199,142,0.15); color: #1a7a50; border: 1px solid rgba(72,199,142,0.3); }

    /* ── WEATHER HERO ── */
    .weather-page-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* Search bar strip */
    .weather-search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 50px;
      padding: 8px 12px 8px 20px;
      box-shadow: 0 4px 24px rgba(74,74,138,0.1);
      width: 100%;
      max-width: 520px;
      margin-bottom: 0;
    }
    .weather-search-bar input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 1rem;
      color: #4a4a8a;
      outline: none;
      font-weight: 500;
    }
    .weather-search-bar input::placeholder { color: #aaa; }
    .icon-btn {
      width: 38px; height: 38px;
      border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .icon-btn-search { background: linear-gradient(135deg, #4a4a8a, #7b7bc4); color: white; }
    .icon-btn-locate { background: linear-gradient(135deg, #43c6ac, #56d4b0); color: white; }
    .icon-btn:hover { transform: scale(1.08); box-shadow: 0 4px 12px rgba(74,74,138,0.25); }

    /* Hero weather display */
    .weather-result {
      text-align: center;
      width: 100%;
      display: none;
      padding: 36px 20px 8px;
    }
    .weather-emoji { font-size: 5.5rem; line-height: 1; filter: drop-shadow(0 8px 16px rgba(74,74,138,0.2)); }
    .weather-temp {
      font-size: 5rem; font-weight: 800;
      background: linear-gradient(135deg, #4a4a8a, #7b7bc4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 10px 0 0;
      line-height: 1;
    }
    .weather-city {
      font-size: 1.15rem; color: #6b6baa; font-weight: 700;
      margin-top: 10px; letter-spacing: 0.5px;
    }
    .weather-desc {
      font-size: 0.95rem; color: #aaa;
      margin-top: 4px; text-transform: uppercase;
      letter-spacing: 1.5px; font-weight: 600;
    }
    .save-fab {
      margin-top: 20px;
      background: linear-gradient(135deg, #4a4a8a, #7b7bc4);
      color: white; border: none; border-radius: 50px;
      padding: 10px 24px; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(74,74,138,0.25);
    }
    .save-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(74,74,138,0.35); }

    /* ── FORECAST ── */
    .forecast-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 8px 4px 16px;
      width: 100%;
      scrollbar-width: none;
    }
    .forecast-strip::-webkit-scrollbar { display: none; }
    .forecast-day {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 14px 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.8);
      flex: 0 0 80px;
      transition: transform 0.15s;
    }
    .forecast-day:hover { transform: translateY(-3px); }
    .forecast-day .f-date { font-size: 0.68rem; color: #aaa; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .forecast-day .f-emoji { font-size: 1.7rem; margin: 6px 0; }
    .forecast-day .f-max { font-size: 0.95rem; font-weight: 800; color: #4a4a8a; }
    .forecast-day .f-min { font-size: 0.8rem; color: #9090c0; margin-top: 2px; }

    /* ── FAVORITES ── */
    .fav-list { display: flex; flex-direction: column; gap: 10px; }
    .fav-item {
      background: rgba(255,255,255,0.7);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(255,255,255,0.8);
    }
    .fav-item-left { display: flex; align-items: center; gap: 10px; }
    .fav-item-city { font-weight: 700; color: #4a4a8a; font-size: 1rem; }
    .fav-item-weather { font-size: 0.85rem; color: #7b7bc4; }
    .fav-weather-badge {
      display: flex; align-items: center; gap: 8px;
    }

    /* ── SEARCH ROW ── */
    .search-row { display: flex; gap: 10px; align-items: flex-end; }
    .search-row .form-group { flex: 1; margin-bottom: 0; }

    /* ── TABS ── */
    .tab-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: rgba(255,255,255,0.4);
      color: #6b6baa;
      transition: all 0.2s;
    }
    .tab-btn.active { background: linear-gradient(135deg, #4a4a8a, #7b7bc4); color: white; box-shadow: 0 4px 12px rgba(74,74,138,0.25); }

    /* ── LINK ── */
    .link-btn { background: none; border: none; color: #4a4a8a; font-weight: 700; cursor: pointer; text-decoration: underline; font-size: 0.9rem; }
    .center-text { text-align: center; margin-top: 18px; font-size: 0.9rem; color: #888; }

    /* ── LOADING ── */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; color: #aaa; padding: 24px 0; font-size: 0.95rem; }

    /* ── FLOATING CLOUDS ── */
    .clouds { position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 0; overflow: hidden; height: 100vh; }
    .cloud { position: absolute; font-size: 3rem; opacity: 0.18; animation: drift linear infinite; }
    @keyframes drift { from { transform: translateX(-120px); } to { transform: translateX(calc(100vw + 120px)); } }
  </style>
</head>
<body>

<!-- Floating clouds decoration -->
<div class="clouds">
  <span class="cloud" style="top:8%; animation-duration:28s; animation-delay:0s;">☁️</span>
  <span class="cloud" style="top:22%; font-size:2rem; animation-duration:35s; animation-delay:-10s;">⛅</span>
  <span class="cloud" style="top:55%; font-size:4rem; animation-duration:42s; animation-delay:-18s;">☁️</span>
  <span class="cloud" style="top:72%; font-size:2.5rem; animation-duration:30s; animation-delay:-5s;">🌤️</span>
  <span class="cloud" style="top:40%; font-size:1.8rem; animation-duration:50s; animation-delay:-25s;">☁️</span>
</div>

<!-- NAV -->
<nav>
  <span class="nav-brand">☁️ CloudWeather</span>
  <div class="nav-links" id="nav-links">
    <button class="nav-btn" id="nav-weather-btn" onclick="showPage('weather')" style="display:none">🌤️ Weather</button>
    <button class="nav-btn" id="nav-favorites-btn" onclick="showPage('favorites')" style="display:none">⭐ Favorites</button>
    <button class="nav-btn" id="nav-account-btn" onclick="showPage('account')" style="display:none">👤 Account</button>
    <button class="nav-btn" id="logout-btn" onclick="logout()" style="display:none">🚪 Logout</button>
  </div>
</nav>

<!-- ══════════════ AUTH PAGE ══════════════ -->
<div class="page active" id="page-auth" style="max-width:440px;">
  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">🔑 Login</button>
      <button class="tab-btn" id="tab-register" onclick="switchAuthTab('register')">✨ Register</button>
    </div>

    <!-- Login -->
    <div id="auth-login">
      <h2>Welcome back! 👋</h2>
      <div id="login-alert" class="alert"></div>
      <div class="form-group">
        <label>📧 Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>🔒 Password</label>
        <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()" />
      </div>
      <button class="btn btn-primary" onclick="doLogin()" id="login-btn">🔑 Login</button>
    </div>

    <!-- Register -->
    <div id="auth-register" style="display:none">
      <h2>Create account ✨</h2>
      <div id="register-alert" class="alert"></div>
      <div class="form-group">
        <label>😊 Name</label>
        <input type="text" id="reg-name" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>📧 Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>🔒 Password</label>
        <input type="password" id="reg-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doRegister()" />
      </div>
      <button class="btn btn-primary" onclick="doRegister()" id="register-btn">✨ Create Account</button>
    </div>
  </div>
</div>

<!-- ══════════════ WEATHER PAGE ══════════════ -->
<div class="page" id="page-weather">
  <div class="weather-page-inner">

    <div class="weather-search-bar">
      <input type="text" id="weather-city" placeholder="Search a city…" onkeydown="if(event.key==='Enter') fetchWeatherAndForecast()" />
      <button class="icon-btn icon-btn-locate" onclick="useMyLocation()" title="Use my location">📍</button>
      <button class="icon-btn icon-btn-search" onclick="fetchWeatherAndForecast()">🔍</button>
    </div>

    <div id="weather-alert" class="alert" style="width:100%; max-width:520px; margin-top:10px;"></div>

    <div class="weather-result" id="weather-result">
      <div class="weather-emoji" id="w-emoji"></div>
      <div class="weather-temp" id="w-temp"></div>
      <div class="weather-city" id="w-city"></div>
      <div class="weather-desc" id="w-desc"></div>
      <button class="save-fab" onclick="addToFavorites()">⭐ Save to Favorites</button>
    </div>

    <div id="forecast-result" style="width:100%;"></div>

  </div>
</div>

<!-- ══════════════ FAVORITES PAGE ══════════════ -->
<div class="page" id="page-favorites">
  <div class="card">
    <h2>⭐ Favorite Cities</h2>
    <div class="search-row" style="margin-bottom:20px;">
      <div class="form-group">
        <label>➕ Add a city</label>
        <input type="text" id="fav-add-input" placeholder="e.g. Barcelona…" onkeydown="if(event.key==='Enter') addFavoriteFromInput()" />
      </div>
      <button class="btn btn-sm" onclick="addFavoriteFromInput()" style="margin-bottom:0; height:46px;">Add ⭐</button>
    </div>
    <div id="fav-alert" class="alert"></div>
    <div class="fav-list" id="fav-list">
      <div class="empty-state">☁️ No favorite cities yet.<br>Add one above!</div>
    </div>
  </div>
</div>

<!-- ══════════════ ACCOUNT PAGE ══════════════ -->
<div class="page" id="page-account">
  <div class="card" style="text-align:center;">
    <div id="acc-avatar" style="
      width:80px; height:80px; border-radius:50%;
      background:linear-gradient(135deg,#4a4a8a,#7b7bc4);
      display:flex; align-items:center; justify-content:center;
      font-size:2.2rem; margin:0 auto 18px; color:white;
      box-shadow:0 6px 20px rgba(74,74,138,0.3);
    ">👤</div>
    <div id="acc-name" style="font-size:1.4rem; font-weight:700; color:#4a4a8a; margin-bottom:6px;"></div>
    <div id="acc-email" style="font-size:0.95rem; color:#9090c0; margin-bottom:24px;"></div>
    <div style="display:flex; gap:12px; justify-content:center; margin-bottom:24px;">
      <div style="background:rgba(74,74,138,0.08); border-radius:14px; padding:14px 24px; flex:1;">
        <div id="acc-fav-count" style="font-size:1.6rem; font-weight:700; color:#4a4a8a;">—</div>
        <div style="font-size:0.8rem; color:#9090c0; margin-top:2px;">⭐ Favorites</div>
      </div>
    </div>
    <button class="btn btn-danger" style="width:100%;" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<script>
  // ── STATE ──────────────────────────────
  let currentUser = JSON.parse(localStorage.getItem('cw_user') || 'null');
  let lastWeatherCity = null;

  // ── WMO WEATHER CODE MAPPING ──────────
  const WMO = {
    0:  ['☀️', 'Clear sky'],
    1:  ['🌤️', 'Mainly clear'], 2: ['⛅', 'Partly cloudy'], 3: ['☁️', 'Overcast'],
    45: ['🌫️', 'Fog'], 48: ['🌫️', 'Icy fog'],
    51: ['🌦️', 'Light drizzle'], 53: ['🌦️', 'Drizzle'], 55: ['🌧️', 'Heavy drizzle'],
    61: ['🌧️', 'Light rain'], 63: ['🌧️', 'Rain'], 65: ['🌧️', 'Heavy rain'],
    71: ['🌨️', 'Light snow'], 73: ['🌨️', 'Snow'], 75: ['❄️', 'Heavy snow'],
    80: ['🌦️', 'Rain showers'], 81: ['🌧️', 'Showers'], 82: ['⛈️', 'Violent showers'],
    95: ['⛈️', 'Thunderstorm'], 96: ['⛈️', 'Thunderstorm + hail'], 99: ['⛈️', 'Heavy thunderstorm'],
  };
  function wmo(code) { return WMO[code] || ['🌡️', 'Unknown']; }

  // ── INIT ──────────────────────────────
  window.onload = () => {
    if (currentUser) {
      enterApp();
    } else {
      showPage('auth');
    }
  };

  function enterApp() {
    document.getElementById('logout-btn').style.display = '';
    document.getElementById('nav-weather-btn').style.display = '';
    document.getElementById('nav-favorites-btn').style.display = '';
    document.getElementById('nav-account-btn').style.display = '';
    document.getElementById('acc-name').textContent = currentUser.name;
    document.getElementById('acc-email').textContent = currentUser.email;
    showPage('weather');
    loadFavCount();
    useMyLocation();
  }

  async function loadFavCount() {
    if (!currentUser) return;
    try {
      const res = await fetch(`/users/${currentUser.user_id}/favorite-cities`);
      const data = await res.json();
      document.getElementById('acc-fav-count').textContent = Array.isArray(data) ? data.length : '—';
    } catch {}
  }

  // ── PAGES ──────────────────────────────
  const PROTECTED_PAGES = ['weather', 'favorites', 'account'];
  function showPage(name) {
    if (PROTECTED_PAGES.includes(name) && !currentUser) {
      showPage('auth');
      return;
    }
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');

    const map = { weather: 0, favorites: 1, account: 2 };
    const btns = document.querySelectorAll('.nav-btn:not(#logout-btn)');
    if (map[name] !== undefined) btns[map[name]]?.classList.add('active');

    if (name === 'favorites') loadFavoritesWeather();
  }

  // ── AUTH TABS ──────────────────────────
  function switchAuthTab(tab) {
    document.getElementById('auth-login').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('auth-register').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  // ── ALERTS ──────────────────────────────
  function showAlert(id, msg, type = 'error') {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'alert alert-' + type;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  // ── LOGIN ──────────────────────────────
  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showAlert('login-alert', '⚠️ Please fill in all fields.');
    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<span class="spinner"></span>Logging in…';
    btn.disabled = true;
    try {
      const res = await fetch('/login', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) return showAlert('login-alert', '❌ ' + (data.detail || 'Login failed.'));
      currentUser = data;
      localStorage.setItem('cw_user', JSON.stringify(data));
      enterApp();
    } catch { showAlert('login-alert', '❌ Network error.'); }
    finally { btn.innerHTML = '🔑 Login'; btn.disabled = false; }
  }

  // ── REGISTER ──────────────────────────
  async function doRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!name || !email || !password) return showAlert('register-alert', '⚠️ Please fill in all fields.');
    const btn = document.getElementById('register-btn');
    btn.innerHTML = '<span class="spinner"></span>Creating…';
    btn.disabled = true;
    try {
      const res = await fetch('/register', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (!res.ok) return showAlert('register-alert', '❌ ' + (data.detail || 'Registration failed.'));
      showAlert('register-alert', '✅ Account created! Please log in.', 'success');
      setTimeout(() => switchAuthTab('login'), 1500);
    } catch { showAlert('register-alert', '❌ Network error.'); }
    finally { btn.innerHTML = '✨ Create Account'; btn.disabled = false; }
  }

  // ── LOGOUT ──────────────────────────────
  function logout() {
    currentUser = null;
    localStorage.removeItem('cw_user');
    document.getElementById('logout-btn').style.display = 'none';
    document.getElementById('nav-weather-btn').style.display = 'none';
    document.getElementById('nav-favorites-btn').style.display = 'none';
    document.getElementById('nav-account-btn').style.display = 'none';
    document.getElementById('fav-list').innerHTML = '<div class="empty-state">☁️ No favorite cities yet.<br>Add one above!</div>';
    document.getElementById('weather-result').style.display = 'none';
    document.getElementById('forecast-result').innerHTML = '';
    showPage('auth');
  }

  // ── GEOLOCATION ─────────────────────────
  function useMyLocation() {
    if (!navigator.geolocation) return showAlert('weather-alert', '⚠️ Geolocation not supported.');
    document.getElementById('weather-result').style.display = 'none';
    document.getElementById('forecast-result').innerHTML = '<div class="empty-state">📍 Detecting location…</div>';
    navigator.geolocation.getCurrentPosition(async pos => {
      const { latitude: lat, longitude: lon } = pos.coords;
      // Reverse geocode to get city name
      try {
        const rg = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const rgd = await rg.json();
        const city = rgd.address?.city || rgd.address?.town || rgd.address?.village || rgd.address?.county || 'Your location';
        document.getElementById('weather-city').value = city;
        await fetchWeatherAndForecast(city);
      } catch { await fetchWeatherAndForecastByCoords(lat, lon); }
    }, () => showAlert('weather-alert', '⚠️ Location access denied. Search a city manually.'));
  }

  // ── WEATHER + FORECAST (by city) ────────
  async function fetchWeatherAndForecast(cityOverride) {
    const city = cityOverride || document.getElementById('weather-city').value.trim();
    if (!city) return showAlert('weather-alert', '⚠️ Please enter a city name.');
    document.getElementById('weather-result').style.display = 'none';
    document.getElementById('forecast-result').innerHTML = '<div class="empty-state">⏳ Loading…</div>';
    try {
      const [wr, fr] = await Promise.all([
        fetch(`/weather?city=${encodeURIComponent(city)}`),
        fetch(`/next_days_weather?city=${encodeURIComponent(city)}`)
      ]);
      const wd = await wr.json();
      if (!wr.ok) { document.getElementById('forecast-result').innerHTML = ''; return showAlert('weather-alert', '❌ ' + (wd.detail || 'City not found.')); }
      renderCurrentWeather(wd);
      lastWeatherCity = city;
      const fd = await fr.json();
      if (fr.ok && !fd.error) renderForecast(fd.daily_weather);
      else document.getElementById('forecast-result').innerHTML = '';
    } catch { showAlert('weather-alert', '❌ Network error.'); document.getElementById('forecast-result').innerHTML = ''; }
  }

  // ── WEATHER + FORECAST (by raw coords, fallback) ─
  async function fetchWeatherAndForecastByCoords(lat, lon) {
    try {
      const [wr, fr] = await Promise.all([
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`),
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`)
      ]);
      const wd = await wr.json(); const fd = await fr.json();
      renderCurrentWeather({ city: 'Your location', temperature: wd.current_weather?.temperature, weather_code: wd.current_weather?.weathercode });
      lastWeatherCity = 'Your location';
      renderForecast(fd.daily);
    } catch { showAlert('weather-alert', '❌ Could not fetch weather.'); }
  }

  function renderCurrentWeather(data) {
    const [emoji, desc] = wmo(data.weather_code);
    document.getElementById('w-emoji').textContent = emoji;
    document.getElementById('w-temp').textContent = data.temperature + '°C';
    document.getElementById('w-city').textContent = '📍 ' + data.city;
    document.getElementById('w-desc').textContent = desc;
    document.getElementById('weather-result').style.display = 'block';
  }

  function renderForecast(d) {
    if (!d) return;
    const days = d.time || [];
    let html = '<div class="forecast-strip">';
    days.forEach((date, i) => {
      const [emoji] = wmo(d.weathercode?.[i]);
      const dLabel = new Date(date).toLocaleDateString('en', { weekday:'short', month:'short', day:'numeric' });
      html += `<div class="forecast-day">
        <div class="f-date">${dLabel}</div>
        <div class="f-emoji">${emoji}</div>
        <div class="f-max">${d.temperature_2m_max?.[i] ?? '—'}°</div>
        <div class="f-min">${d.temperature_2m_min?.[i] ?? '—'}°</div>
      </div>`;
    });
    html += '</div>';
    document.getElementById('forecast-result').innerHTML = html;
  }

  // ── ADD TO FAVORITES (from weather page) ─
  async function addToFavorites() {
    if (!currentUser) return showAlert('weather-alert', '⚠️ Please log in first.');
    if (!lastWeatherCity) return;
    await addFavorite(lastWeatherCity);
    showAlert('weather-alert', `⭐ "${lastWeatherCity}" saved to favorites!`, 'success');
  }

  async function addFavoriteFromInput() {
    const city = document.getElementById('fav-add-input').value.trim();
    if (!city) return showAlert('fav-alert', '⚠️ Please enter a city name.');
    await addFavorite(city);
    document.getElementById('fav-add-input').value = '';
  }

  async function addFavorite(city) {
    if (!currentUser) return showAlert('fav-alert', '⚠️ Please log in first.');
    try {
      const res = await fetch(`/users/${currentUser.user_id}/favorite-cities?city=${encodeURIComponent(city)}`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) return showAlert('fav-alert', '❌ ' + (data.detail || 'Error.'));
      showAlert('fav-alert', `⭐ "${city}" added!`, 'success');
      loadFavoritesWeather();
    } catch { showAlert('fav-alert', '❌ Network error.'); }
  }

  // ── LOAD FAVORITES ──────────────────────
  async function loadFavorites() {
    if (!currentUser) return;
    try {
      const res = await fetch(`/users/${currentUser.user_id}/favorite-cities`);
      return await res.json();
    } catch { return []; }
  }

  async function loadFavoritesWeather() {
    if (!currentUser) return;
    const list = document.getElementById('fav-list');
    list.innerHTML = '<div class="empty-state">⏳ Loading weather…</div>';
    try {
      const res = await fetch(`/users/${currentUser.user_id}/favorite-cities/weather`);
      const data = await res.json();
      if (!data.length) {
        list.innerHTML = '<div class="empty-state">☁️ No favorite cities yet.<br>Add one above!</div>';
        return;
      }
      list.innerHTML = data.map(item => {
        if (item.error) return `
          <div class="fav-item">
            <div class="fav-item-left">🏙️ <span class="fav-item-city">${item.city}</span></div>
            <div class="fav-item-weather">⚠️ ${item.error}</div>
            <button class="btn btn-danger" onclick="deleteFavorite('${item.city}')">🗑️</button>
          </div>`;
        const [emoji, desc] = wmo(item.weather_code);
        return `
          <div class="fav-item">
            <div class="fav-item-left">
              <span style="font-size:1.6rem">${emoji}</span>
              <div>
                <div class="fav-item-city">${item.city}</div>
                <div class="fav-item-weather">${desc} · ${item.temperature}°C</div>
              </div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              <button class="btn btn-sm" onclick="viewCityWeather('${item.city}')" style="padding:7px 12px; font-size:0.8rem;">📅 Forecast</button>
              <button class="btn btn-danger" onclick="deleteFavorite('${item.city}')">🗑️</button>
            </div>
          </div>`;
      }).join('');
    } catch { list.innerHTML = '<div class="empty-state">❌ Error loading favorites.</div>'; }
  }

  // ── DELETE FAVORITE ──────────────────────
  async function deleteFavorite(city) {
    if (!currentUser) return;
    try {
      await fetch(`/users/${currentUser.user_id}/favorite-cities/${encodeURIComponent(city)}`, { method: 'DELETE' });
      loadFavoritesWeather();
    } catch { showAlert('fav-alert', '❌ Network error.'); }
  }

  // ── VIEW CITY IN FORECAST ────────────────
  function viewCityWeather(city) {
    document.getElementById('weather-city').value = city;
    showPage('weather');
    fetchWeatherAndForecast(city);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
